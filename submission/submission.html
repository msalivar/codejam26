<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>Skip Ad</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <style>
    html, body {
      background: transparent;
      margin: 0;
      padding: 0;
      font-family: sans-serif;
    }

    #overlay-container {
      width: 960px;
      height: 540px;
      position: relative;
    }

    /* Phase 1 — skip button */
    #skip-btn {
      display: none;
      position: absolute;
      bottom: 60px;
      right: 0;
      padding: 10px 18px;
      background: rgba(0, 0, 0, 0.6);
      border: 1px solid rgba(255, 255, 255, 0.2);
      border-right-width: 0;
      font-size: 1rem;
      border-radius: 4px 0 0 4px;
      color: white;
      cursor: pointer;
      font-family: sans-serif;
    }

    #skip-btn:hover {
      background: rgba(0, 0, 0, 0.8);
    }

    /* Phase 2 — typing panel */
    #typing-panel {
      display: none;
      position: absolute;
      bottom: 0;
      left: 0;
      right: 0;
      height: 100px;
      background: rgba(0, 0, 0, 0.78);
      padding: 6px 12px 1px;
      box-sizing: border-box;
      flex-direction: column;
      gap: 4px;
    }

    #typing-panel.visible {
      display: flex;
    }

    /* Progress bars */
    #bars-container {
      display: flex;
      flex-direction: column;
      gap: 6px;
    }

    .bar-row {
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .bar-label {
      color: rgba(255, 255, 255, 0.55);
      font-size: 11px;
      width: 28px;
      flex-shrink: 0;
    }

    .bar-track {
      flex: 1;
      height: 8px;
      background: rgba(255, 255, 255, 0.12);
      border-radius: 4px;
      position: relative;
      overflow: visible;
    }

    .bar-fill {
      height: 100%;
      border-radius: 4px;
      width: 0%;
    }

    #ad-bar  { background: rgba(255, 255, 255, 0.55); }
    #skip-bar { background: #4caf50; }

    .race-icon {
      position: absolute;
      top: -18px;
      font-size: 15px;
      transform: translateX(-50%);
      pointer-events: none;
      left: 0%;
    }

    /* Passage text */
    #passage-container {
      flex: 1;
      overflow: hidden;
      position: relative;
      display: flex;
      align-items: center;
    }

    #passage-inner {
      white-space: nowrap;
      font-family: monospace;
      font-size: 14px;
      line-height: 1.4;
      position: absolute;
      left: 0;
    }

    .char-correct { color: #4caf50; }
    .char-error   { color: #f44336; background: rgba(244, 67, 54, 0.25); border-radius: 2px; }
    .char-current { color: white; border-bottom: 2px solid white; }
    .char-pending { color: rgba(255, 255, 255, 0.45); }

    /* Prompt — centred over the whole frame, fades out after a few seconds */
    #prompt-label {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      background: rgba(0, 0, 0, 0.65);
      color: white;
      font-size: 20px;
      padding: 14px 28px;
      border-radius: 6px;
      white-space: nowrap;
      pointer-events: none;
      opacity: 0;
      transition: opacity 1.5s ease;
    }
  </style>
</head>
<body>
  <div id="overlay-container">

    <button id="skip-btn">Skip Ad ›</button>

    <div id="typing-panel">
      <div id="bars-container">
        <div class="bar-row">
          <span class="bar-label">Ad</span>
          <div class="bar-track">
            <div id="ad-bar" class="bar-fill"></div>
            <span id="flag-icon" class="race-icon">🏁</span>
          </div>
        </div>
        <div class="bar-row">
          <span class="bar-label">Skip</span>
          <div class="bar-track">
            <div id="skip-bar" class="bar-fill"></div>
            <span id="car-icon" class="race-icon">🚗</span>
          </div>
        </div>
      </div>

      <div id="passage-container">
        <div id="passage-inner"></div>
      </div>

    </div>

    <div id="prompt-label">Type to skip this ad</div>

  </div>
  <script>
/*
 * TypeRacer Skip Ad
 *
 * When the user clicks "Skip Ad", the normal skip button is replaced by a
 * typing-challenge panel at the bottom of the screen. The user must type a
 * passage to advance a "Skip" progress bar that races against the ad's
 * progress bar. A rubber-band difficulty controller keeps the skip bar
 * tantalisingly close to — but slightly behind — the ad bar until a win
 * threshold is reached (30% of the ad's duration). After that, a fast enough
 * typist can overtake the ad bar and trigger a successful skip.
 *
 * Phases:
 *   'waiting' → adStarted received
 *   'idle'    → skip button visible, waiting for click
 *   'typing'  → panel visible, keystroke listener active
 *   'done'    → success or fail posted to parent
 *
 * Hidden keys (typing phase only):
 *   CHEAT_KEY (default F8) — cheat mode: bypass rubber-band and win threshold, skip bar flies past ad bar
 *   INJECT_DIFFICULT_KEY (default F10) — insert a Pool C difficult string just after the current sentence
 */
(function(window, document) {

  // ---- Config ----
  // All tunable constants live here. They are grouped by concern so you can
  // find what you need without reading the implementation code.
  //
  // NOTE: The rubber-band controller (adjustProgressScale) contains its own
  // fine-grained speed/brake thresholds inline. They are heavily interdependent
  // and are documented there; adjust them only after you understand how the
  // three timing phases work.

  // -- Win / timing conditions --
  //
  // Fraction of the ad's duration that must pass before winning is possible.
  // Increase (e.g. 0.5) to force the user to sit through more of the ad.
  // Decrease (e.g. 0.15) to allow an early escape on shorter ads.
  var WIN_THRESHOLD_FRACTION       = 0.30;
  //
  // Hard cap (seconds) on the win threshold so very long ads don't lock the
  // user out for too long. Increase (e.g. 60) for a more punishing experience;
  // decrease (e.g. 15) to cap the mandatory viewing window.
  var WIN_THRESHOLD_MAX_SECS       = 30;
  //
  // The rubber-band slowdown stops at this fraction of the win threshold.
  // Below this point, braking and boosting are both active. Above it, only
  // boosting applies (helping a slow typist catch up without dragging a fast
  // one back). Increase toward 1.0 to extend the braking phase; decrease
  // toward 0 to remove braking almost entirely.
  var SLOW_STOP_TO_WIN_RATIO       = 0.75;
  //
  // Assumed ad duration (seconds) used before the real duration arrives.
  // If the shell takes a moment to send timeupdate events, this keeps the
  // bar ratios reasonable in the meantime. Match your typical test video
  // length; an off value only affects the first few frames.
  var FALLBACK_VIDEO_DURATION      = 60;
  //
  // Minimum number of complete sentences (ending in . ? !) the user must
  // type before winning is possible, regardless of bar positions or timing.
  // Increase to require more typing; set to 0 to remove the gate entirely.
  var MIN_SENTENCES_TO_WIN         = 2;

  // -- Speed / progress scale --
  //
  // Starting speed multiplier applied to the per-character gain. Keeping this
  // below 1.0 prevents a fast typist from outrunning the ad bar immediately.
  // Increase toward 1.0 for a gentler start; decrease toward 0.3 for a very
  // sluggish opening that the rubber-band controller then lifts gradually.
  var INITIAL_PROGRESS_SCALE       = 0.6;
  //
  // Speed multiplier locked in when the F8 cheat key is pressed.
  // Any value above 1.0 guarantees rapid bar advancement; 2.0 is
  // comfortable, 4.0+ is nearly instant.
  var CHEAT_PROGRESS_SCALE         = 2.0;

  // -- Rubber-band controller --
  //
  // Target position of the skip bar as a fraction of the ad bar's position.
  // 0.7 keeps the skip car about 30% behind the flag, creating tension without
  // feeling hopeless. Increase toward 1.0 to let the user nearly catch up;
  // decrease toward 0.5 to keep them further behind.
  var RUBBER_BAND_TARGET_FRACTION  = 0.7;
  //
  // When the skip bar would exceed the ad bar before win conditions are met,
  // it is clamped to (videoProgress - CEILING_GAP). Increase (e.g. 5) for a
  // more visible gap; decrease toward 0 to let the bars almost touch.
  var CEILING_GAP                  = 0.1;
  //
  // When the ceiling clamp fires, progressScale is multiplied by this factor
  // as a penalty. Values closer to 1.0 (e.g. 0.9) apply a gentle nudge;
  // values closer to 0 (e.g. 0.5) apply a harsh brake.
  var CEILING_PENALTY_FACTOR       = 0.75;
  //
  // How far behind the ad bar (in videoProgress %) the skip bar starts when
  // the user first clicks "Skip Ad". A small offset (e.g. 1–3) prevents an
  // instant win if the user clicks very late, without penalising an early click.
  var SKIP_START_OFFSET            = 1;

  // -- Late-game boosts --
  //
  // videoProgress % checkpoints at which a one-time speed boost fires to help
  // the user win before the ad ends. Add/remove entries to change how many
  // boosts are given and when. Values must be in ascending order.
  var LATE_BOOST_THRESHOLDS        = [70, 80, 90];
  //
  // Amount added to progressScale at each boost checkpoint. Increase (e.g. 0.3)
  // for larger, more noticeable jumps; decrease (e.g. 0.05) for subtle nudges.
  var LATE_BOOST_AMOUNT            = 0.15;
  //
  // Maximum progressScale the late-game boosts can push to. Acts as a ceiling
  // independent of cheat mode; increase (e.g. 5.0) to let boosts compound
  // aggressively, decrease (e.g. 1.5) to keep the late game more controlled.
  var LATE_BOOST_SCALE_MAX         = 3.0;

  // -- Passage generation --
  //
  // Append a new POOL_A sentence when fewer than this many untyped characters
  // remain. Increase (e.g. 150) for more lead time so appends are never
  // visible mid-word; decrease (e.g. 40) to keep the buffer tighter.
  var APPEND_TRIGGER_CHARS         = 80;
  //
  // Minimum passage length (characters) enforced at session start. POOL_A
  // entries are appended until this is met so the user never sees text appear
  // the moment they start typing. Increase for a longer initial buffer.
  var MIN_INITIAL_PASSAGE_LENGTH   = 200;

  // -- UI / display --
  //
  // Duration (ms) before the "Type to skip" hint label fades out after the
  // typing panel opens. Increase for a longer visible hint; set to 0 to hide
  // it immediately.
  var PROMPT_FADE_DELAY_MS         = 4000;
  //
  // Clamp range for race icon (car / flag) positions. Keeps the emoji inside
  // the visible bar track. Widen the range (e.g. 0/100) to allow edge-clipping;
  // narrow it (e.g. 5/95) to add more padding.
  var ICON_POSITION_MIN            = 1;
  var ICON_POSITION_MAX            = 99;
  //
  // localStorage key used to persist the last POOL_B index across page loads
  // so the same opener is never shown in back-to-back sessions. Change the
  // string if you want to reset persistence without clearing localStorage.
  var LOCALSTORAGE_LAST_B_KEY      = 'skipgame_lastB';

  // -- Secret hotkeys --
  //
  // Key that activates cheat mode: disables the rubber-band controller, removes
  // the win-threshold and sentence-count gates, and sets progressScale to
  // CHEAT_PROGRESS_SCALE so the skip bar overtakes the ad bar immediately.
  // Change to any valid KeyboardEvent.key string (e.g. 'F9', 'F2').
  var CHEAT_KEY                    = 'F8';
  //
  // Key that injects a random Pool C (difficult punctuation) string just after
  // the current sentence, giving a judge or tester a way to crank up difficulty
  // mid-session without reloading. Change to any valid KeyboardEvent.key string.
  var INJECT_DIFFICULT_KEY         = 'F10';

  // ---- Paragraph pools ----
  //
  // POOL_A — filler text drawn from as many times as needed (pangrams,
  // alliterations, Kitboga-themed nonsense). Appended automatically to keep
  // the passage feeling infinite. Each entry ends with a period.
    var POOL_A = [
    "The quick brown fox jumps over the lazy dog.",
    "Bright vixens jump; dozy fowl quack.",
    "How vexingly quick daft zebras jump.",
    "Sphinx of black quartz, judge my vow.",
    "The five boxing wizards jump quickly.",
    "A wizard's job is to vex chumps quickly in fog.",
    "Blowzy red vixens fight for a quick jump.",
    "The jay, pig, fox, zebra and my wolves quack.",
    "Jinxed wizards pluck ivy from the big quilt.",
    "Grumpy wizards make toxic brew for the evil queen and jack.",
    "And hast thou slain the Jabberwock?",
    "Twas brillig, and the slithy toves did gyre and gimble in the wabe.",
    "Purple pig.",
    "Happy horse.",
    "Scandalous scoundrel.",
    "Scrappy sailor.",
    "Misty mountain.",
    "Jumping jellyfish.",
    "Peculiar penguin.",
    "Baffling buffalo.",
    "Wandering walrus.",
    "Dazzling dolphin.",
    "Grumpy gorilla.",
    "The money is stored in the donkey barn and I will not redeem it under any circumstances.",
    "Edna always said that crows lift weights to get buff, and she was right about everything.",
    "Milton keeps a jar of cold ketchup on his desk at all times.",
    "Please kiss your dog on the nose and give Miller a good scratch behind the ears.",
    "Hot dog water is the beverage of choice for mother toad.",
    "It is not a cult. It is simply a group of people who believe in bean work.",
    "I put mayonnaise on my pecan sandies every morning and I regret nothing.",
  ];

  // POOL_B — short ironic first-person sentences. Exactly one is chosen at
  // the start of each session and used as the opening of the passage.
  var POOL_B = [
    "I do not consent to this advertisement.",
    "Advertising makes free content possible and I am grateful.",
    "I agree to all terms and conditions.",
    "I acknowledge the right of this platform to show me advertisements at any time.",
    "I am a real human who enjoys watching advertisements.",
    "I find ads enriching, but I am simply too busy right now.",
    "I confirm that I am attempting to circumvent this advertisement.",
    "I promise to think fondly of this brand during my next shopping experience.",
    "I am typing this of my own free will and under no duress whatsoever.",
  ];

  // POOL_C — deliberately difficult strings injected by the F10 secret hotkey.
  // Funny/ironic like Pool B but loaded with apostrophes, semicolons, parentheses,
  // numbers, and awkward punctuation to punish fast typists who think they're winning.
  var POOL_C = [
    "Don't, won't, can't, shan't, wouldn't, couldn't, shouldn't.",
    "She'd mnemonically memorized Mississippi, Worcestershire, and onomatopoeia; 'necessary' eluded her.",
    "The fine print (pp. 6-9) in the ToS states: 'viewer's implicit consent is granted upon eye contact.'",
    "It's the viewer's responsibility - not the advertiser's - to ensure full, attentive viewership.",
    "Couldn't've, shouldn't've, wouldn't've, mightn't've, needn't've.",
    "Worcestershire, Gloucestershire, Leicestershire, and Loughborough are all perfectly reasonable names.",
    "Pursuant to section 3(a)(ii) of the ToS, the viewer's attention is hereby considered legally 'captured'.",
    "It's not the ad's fault - nor the platform's - that the viewer's patience is, admittedly, limited.",
    "Rhythm, syzygy, crypt, and nymph are words; 'couldn't've' is also a word, apparently.",
    "The advertiser's terms (revised ed., pp. 3-7) supersede the viewer's reasonable expectations entirely.",
    "Pneumonoultramicroscopicsilicovolcanoconiosis: that's one word; 'floccinaucinihilipilification' is another.",
    "Hippopotomonstrosesquippedaliophobia is the fear of long words; whoever named it was clearly having fun.",
    "The word 'sesquipedalian' describes a love of long words, which is somewhat ironic given its length.",
    "Antidisestablishmentarianism is a real word; so is 'supercalifragilisticexpialidocious', technically.",
    "Subparagraph (c)(4)(B)(iii) of the ToS clarifies that 'skipping' is defined as 'not currently permitted'.",
  ];

  // Return a random element from an array.
  function pick(arr) {
    return arr[Math.floor(Math.random() * arr.length)];
  }

  // ---- State ----
  var state = {
    phase: 'waiting',       // current game phase (see top-of-file comment)
    cheatMode: false,       // true after F8 is pressed; disables all restrictions
    loggedSlowStop: false,  // guards the one-time console log for slow-stop threshold
    loggedWin: false,       // guards the one-time console log for win threshold
    passage: '',            // the full text the user must type
    typedIndex: 0,          // index of the next character the user must type
    hasError: false,        // true when the last keystroke was wrong; clears on Backspace
    progressScale: INITIAL_PROGRESS_SCALE, // multiplier applied to baseGain; starts low so early typing doesn't outrun the ad
    skipProgress: 0,        // 0–100: how far the skip bar has advanced
    videoProgress: 0,       // 0–100: how far the ad has played (currentTime / duration * 100)
    currentTime: 0,         // ad playback time in seconds, updated by timeupdate events
    videoDuration: null,    // ad duration in seconds; set on first timeupdate with a valid duration
    baseGain: null,         // skipProgress gain per correct character (100 / initial passage length)
    usedPassages: [],       // prevents repeating entries; stores keys like 'A3' or 'B1'
    lateBoostsApplied: 0,  // counts how many LATE_BOOST_THRESHOLDS have fired (0–3)
    sentencesTyped: 0,     // counts terminal punctuation (. ? !) the user has typed; gated by MIN_SENTENCES_TO_WIN
  };

  // ---- Element refs ----
  var skipBtn       = document.getElementById('skip-btn');
  var typingPanel   = document.getElementById('typing-panel');
  var adBar         = document.getElementById('ad-bar');
  var skipBarEl     = document.getElementById('skip-bar');
  var flagIcon      = document.getElementById('flag-icon');
  var carIcon       = document.getElementById('car-icon');
  var passageInner  = document.getElementById('passage-inner');
  var promptLabel   = document.getElementById('prompt-label');

  // ---- Helpers ----

  // Return a random index in [0, poolLen) that is not equal to `avoid`.
  // Used to prevent the same POOL_B sentence from appearing in back-to-back sessions.
  function pickAvoid(poolLen, avoid) {
    var available = [];
    for (var i = 0; i < poolLen; i++) { if (i !== avoid) available.push(i); }
    return available[Math.floor(Math.random() * available.length)];
  }

  // Build the opening passage for a session.
  // Picks one POOL_B sentence, avoiding the one shown in the previous session
  // (persisted in localStorage) so the user doesn't see the same opener twice in a row.
  function buildPassage() {
    var lastUsedPoolBIndex = parseInt(localStorage.getItem(LOCALSTORAGE_LAST_B_KEY) || '-1', 10);
    var nextPoolBIndex = pickAvoid(POOL_B.length, lastUsedPoolBIndex);
    localStorage.setItem(LOCALSTORAGE_LAST_B_KEY, nextPoolBIndex);
    state.usedPassages = ['B' + nextPoolBIndex];
    return POOL_B[nextPoolBIndex];
  }

  // The earliest time (in seconds) at which the user can win by overtaking the ad bar.
  // Set to 30% of the ad duration so a very fast typist still has to sit through
  // a meaningful portion of the advertisement.
  function getWinThreshold() {
    var fraction = (state.videoDuration || FALLBACK_VIDEO_DURATION) * WIN_THRESHOLD_FRACTION;
    return Math.min(fraction, WIN_THRESHOLD_MAX_SECS);
  }

  // The time (in seconds) at which the rubber-band slowdown logic stops applying.
  // Before this point the controller actively brakes the skip bar; after this point
  // it only boosts (helping a slow typist catch up, never dragging a fast one back).
  // Defined as a fixed ratio of the win threshold so both always stay in sync.
  function getSlowStopThreshold() {
    return getWinThreshold() * SLOW_STOP_TO_WIN_RATIO;
  }

  // Compute per-character skipProgress gain, scaled to both passage length and video duration.
  // Locking to the initial passage length means appending POOL_A text later doesn't dilute gain.
  // Scaling by duration keeps difficulty consistent across ad lengths — a 15s ad gives
  // proportionally more gain per character than a 60s ad, so the skip bar always moves at
  // roughly the same speed relative to the ad bar regardless of how fast the video plays.
  // Called once at adStarted (using FALLBACK_VIDEO_DURATION) and again on the first timeupdate
  // once the real duration is known.
  function computeBaseGain() {
    var duration = state.videoDuration || FALLBACK_VIDEO_DURATION;
    state.baseGain = (100 / state.passage.length) * (FALLBACK_VIDEO_DURATION / duration);
  }

  // Append one random POOL_A entry to the live passage so the user never runs out
  // of text. Already-used entries are skipped; when all have been used, the used
  // list resets so entries can appear again. New characters are appended directly as
  // DOM spans (preserving the colour state of already-typed characters) rather than
  // re-rendering the whole passage from scratch.
  function appendNextParagraph() {
    var available = [];
    for (var i = 0; i < POOL_A.length; i++) {
      if (state.usedPassages.indexOf('A' + i) === -1) available.push(i);
    }
    // If all POOL_A used, reset so they can repeat
    if (available.length === 0) {
      state.usedPassages = state.usedPassages.filter(function(p) { return p[0] !== 'A'; });
      for (var j = 0; j < POOL_A.length; j++) available.push(j);
    }

    var idx = available[Math.floor(Math.random() * available.length)];
    state.usedPassages.push('A' + idx);

    var newText = ' ' + POOL_A[idx];
    state.passage += newText;

    for (var k = 0; k < newText.length; k++) {
      var span = document.createElement('span');
      span.textContent = newText[k];
      span.className = 'char-pending';
      passageInner.appendChild(span);
    }
  }

  // Insert a random Pool C string just after the end of the current sentence.
  // Scans forward from typedIndex for the next '.', '?', or '!' and splices the
  // new text in at that position — both in state.passage and in the DOM spans —
  // without disturbing already-typed (green) characters.
  function insertDifficultString() {
    var insertAt = state.passage.length; // fallback: end of passage
    for (var i = state.typedIndex; i < state.passage.length; i++) {
      var c = state.passage[i];
      if (c === '.' || c === '?' || c === '!') {
        insertAt = i + 1;
        break;
      }
    }

    var newText = ' ' + pick(POOL_C);

    // Splice into the passage string
    state.passage = state.passage.slice(0, insertAt) + newText + state.passage.slice(insertAt);

    // Insert DOM spans at the same position.
    // insertBefore(span, refChild) places each new span before the original refChild,
    // so repeated inserts build the text in the correct order.
    var refChild = passageInner.children[insertAt] || null;
    for (var k = 0; k < newText.length; k++) {
      var span = document.createElement('span');
      span.textContent = newText[k];
      span.className = 'char-pending';
      passageInner.insertBefore(span, refChild);
    }

    updatePassageDisplay();
  }

  // ---- Shell message listener ----
  // Receives postMessage events from the game shell (index.html).
  // All game state that depends on the video lives here.
  window.addEventListener('message', function(event) {
    if (!event.data || !event.data.type) return;

    switch (event.data.type) {
      // Ad has started playing — initialise passage and show the skip button.
      // Pool A entries are appended until passage reaches MIN_INITIAL_PASSAGE_LENGTH
      // so the user doesn't see text being added on their very first keystrokes.
      // The spans added by appendNextParagraph() are discarded when renderPassage()
      // clears the DOM; state.passage already holds the full text by that point.
      case 'adStarted':
        state.passage = buildPassage();
        while (state.passage.length < MIN_INITIAL_PASSAGE_LENGTH) { appendNextParagraph(); }
        computeBaseGain();
        renderPassage();
        state.phase = 'idle';
        skipBtn.style.display = 'block';
        break;

      // Ad ended without the user winning — report failure to the shell.
      case 'adFinished':
        if (state.phase !== 'done') {
          state.phase = 'done';
          window.top.postMessage({ type: 'fail' }, '*');
        }
        break;

      // Fired frequently while the ad plays; drives videoProgress and threshold logging.
      case 'timeupdate':
        var duration = event.data.duration;
        state.currentTime = event.data.currentTime;
        if (duration && !state.videoDuration) {
          state.videoDuration = duration;
          computeBaseGain(); // recalculate now that real duration is known
        }
        if (duration && duration > 0) {
          state.videoProgress = (state.currentTime / duration) * 100;
        }
        if (duration) {
          var slowStopLogThreshold = getSlowStopThreshold();
          var winLogThreshold      = getWinThreshold();
          if (!state.loggedSlowStop && state.currentTime >= slowStopLogThreshold) {
            state.loggedSlowStop = true;
            console.log('[skipgame] slow-stop threshold reached at', state.currentTime.toFixed(2) + 's (target: ' + slowStopLogThreshold.toFixed(2) + 's)');
          }
          if (!state.loggedWin && state.currentTime >= winLogThreshold) {
            state.loggedWin = true;
            console.log('[skipgame] win threshold reached at', state.currentTime.toFixed(2) + 's (target: ' + winLogThreshold.toFixed(2) + 's)');
          }
        }
        // One-time speed boosts at 70%, 80%, 90% of the ad to help the user win late.
        // lateBoostsApplied acts as both a counter and a pointer into LATE_BOOST_THRESHOLDS,
        // so each threshold fires exactly once and in order without needing separate flags.
        if (state.phase === 'typing' && state.lateBoostsApplied < LATE_BOOST_THRESHOLDS.length) {
          if (state.videoProgress >= LATE_BOOST_THRESHOLDS[state.lateBoostsApplied]) {
            state.progressScale = Math.min(LATE_BOOST_SCALE_MAX, state.progressScale + LATE_BOOST_AMOUNT);
            state.lateBoostsApplied++;
          }
        }
        updateBars();
        checkWin();
        break;
    }
  });

  skipBtn.addEventListener('click', function() {
    if (state.phase !== 'idle') return;
    state.phase = 'typing';
    // Start the skip bar just behind wherever the ad has reached, so a late click
    // doesn't strand the user at 0% while the ad bar is already well ahead.
    state.skipProgress = Math.max(0, state.videoProgress - SKIP_START_OFFSET);
    skipBtn.style.display = 'none';
    typingPanel.classList.add('visible');
    promptLabel.style.opacity = '1';
    setTimeout(function() {
      promptLabel.style.opacity = '0';
    }, PROMPT_FADE_DELAY_MS);
    document.addEventListener('keydown', onKeyDown);
  });

  // Handle a keypress while the typing phase is active.
  //
  // Key routing:
  //   CHEAT_KEY        → enable cheat mode (bypasses rubber-band and win threshold)
  //   Backspace → clear the current error (cursor does not retreat)
  //   Any other single character → attempt to match against the expected character
  //
  // On a correct character:
  //   - Advance typedIndex and award progress gain
  //   - Apply a hard ceiling so the skip bar never visually passes the ad bar before
  //     the win threshold (only active outside cheat mode)
  //   - Run the per-character rubber-band scale controller (adjustProgressScale)
  //   - Trigger a POOL_A append if fewer than APPEND_TRIGGER_CHARS untyped characters remain
  //
  // On an incorrect character:
  //   - Set hasError; further typing is blocked until Backspace is pressed
  function onKeyDown(e) {
    if (state.phase !== 'typing') return;

    if (e.key === INJECT_DIFFICULT_KEY) {
      e.preventDefault(); // prevent browser from focusing the menu bar
      insertDifficultString();
      return;
    }

    if (e.key === CHEAT_KEY) {
      state.cheatMode = true;
      state.progressScale = CHEAT_PROGRESS_SCALE;
      return;
    }

    if (e.key === 'Backspace') {
      if (state.hasError) {
        state.hasError = false;
        updatePassageDisplay();
      }
      return;
    }

    if (e.key.length !== 1) return;
    if (state.hasError) return;

    var expected = state.passage[state.typedIndex];

    if (e.key === expected) {
      state.typedIndex++;
      state.hasError = false;

      // Per-character progress gain
      var gain = state.baseGain * state.progressScale;
      state.skipProgress = Math.min(100, state.skipProgress + gain);
      // Hard ceiling: if any win condition is unmet, clamp the skip bar just below
      // the ad bar and penalise progressScale so the user must earn speed back.
      // NOTE: sentencesTyped is intentionally incremented AFTER this check so that
      // the ceiling is still active on the keystroke that completes the final required
      // sentence. checkWin() below sees the updated count, so the win can still
      // trigger on the very next correct character.
      var winConditionsMet = state.currentTime >= getWinThreshold() && state.sentencesTyped >= MIN_SENTENCES_TO_WIN;
      if (!state.cheatMode && !winConditionsMet && state.skipProgress >= state.videoProgress) {
        state.skipProgress = Math.max(0, state.videoProgress - CEILING_GAP);
        state.progressScale = Math.max(INITIAL_PROGRESS_SCALE, state.progressScale * CEILING_PENALTY_FACTOR);
      }

      // Count completed sentences (terminal punctuation = sentence boundary).
      // Incremented after the ceiling check — see note above.
      if (expected === '.' || expected === '?' || expected === '!') {
        state.sentencesTyped++;
      }

      // Per-character rubber-band scale adjustment
      if (!state.cheatMode) {
        adjustProgressScale();
      }

      updateBars();
      checkWin();

      // Append more text when running low (keeps passage feeling infinite)
      if (state.passage.length - state.typedIndex < APPEND_TRIGGER_CHARS) {
        appendNextParagraph();
      }
    } else {
      state.hasError = true;
    }

    updatePassageDisplay();
  }

  // Rubber-band difficulty controller — called on every correct character.
  //
  // Adjusts progressScale so that the skip bar hovers close to — but just
  // behind — the ad bar. The target position is RUBBER_BAND_TARGET_FRACTION of videoProgress.
  // Firing per character (rather than per word) produces smooth, continuous drift
  // instead of discrete jumps at word boundaries.
  //
  // Deltas are ~1/5 of the equivalent per-word values, giving the same net effect
  // over a typical word without large step changes.
  //
  // Three timing phases:
  //   Before slowStopThreshold: full control — both slowdown and boost tiers active.
  //   Between slowStopThreshold and winThreshold: boost only.
  //   After winThreshold: win is possible; gentle boost if still behind.
  //
  // `headroom`    = videoProgress - skipProgress  (distance from the ad bar ceiling)
  // `gapToTarget` = targetSkip - skipProgress     (distance from the target fraction)
  function adjustProgressScale() {
    var targetSkip  = state.videoProgress * RUBBER_BAND_TARGET_FRACTION;
    var gapToTarget = targetSkip - state.skipProgress;
    var headroom    = state.videoProgress - state.skipProgress;

    if (state.currentTime < getSlowStopThreshold()) {
      if (headroom <= 0) {
        // Past ceiling — brake hard
        state.progressScale = Math.max(0.03, state.progressScale - 0.05);
      } else if (headroom < 3) {
        // Very close to ceiling — aggressive slowdown
        state.progressScale = Math.max(0.05, state.progressScale - 0.04);
      } else if (headroom < 8) {
        // Getting close to ceiling — moderate slowdown
        state.progressScale = Math.max(0.08, state.progressScale - 0.02);
      } else if (headroom > 15) {
        // Far below ceiling — boost to catch up; high ceiling so long ads can recover in reasonable time
        state.progressScale = Math.min(2.5, state.progressScale + 0.07);
      } else if (headroom > 8) {
        // Moderately behind — solid boost
        state.progressScale = Math.min(1.8, state.progressScale + 0.03);
      } else if (gapToTarget > 10) {
        // Below target fraction — gentle boost
        state.progressScale = Math.min(1.2, state.progressScale + 0.01);
      } else if (gapToTarget < -5) {
        // Above target fraction but not near ceiling — small nudge down
        state.progressScale = Math.max(0.3, state.progressScale - 0.01);
      }
    } else if (state.currentTime < getWinThreshold()) {
      // Slowdown phase over — only boost if falling behind
      if (headroom > 15) {
        state.progressScale = Math.min(1.6, state.progressScale + 0.05);
      } else if (headroom > 8) {
        state.progressScale = Math.min(1.4, state.progressScale + 0.02);
      }
    } else {
      // Win threshold passed — gentle boost if still behind
      if (state.skipProgress < state.videoProgress && gapToTarget > 20) {
        state.progressScale = Math.min(1.5, state.progressScale + 0.02);
      }
    }
  }

  // Build the initial per-character DOM for the passage.
  // Called once when the ad starts (before the typing panel is visible).
  // Each character becomes its own <span> so we can colour them individually.
  // appendNextParagraph() adds further spans later without calling this again.
  function renderPassage() {
    passageInner.innerHTML = '';
    for (var i = 0; i < state.passage.length; i++) {
      var span = document.createElement('span');
      span.textContent = state.passage[i];
      passageInner.appendChild(span);
    }
    updatePassageDisplay();
  }

  // Recolour every character span to reflect the current typedIndex and error state.
  //   char-correct → typed correctly (green)
  //   char-current → the next character to type; red background if hasError
  //   char-pending → not yet reached (dim)
  // Called after every keystroke and after appending new text.
  function updatePassageDisplay() {
    var spans = passageInner.children;
    for (var i = 0; i < spans.length; i++) {
      var charSpan = spans[i];
      if (i < state.typedIndex) {
        charSpan.className = 'char-correct';
      } else if (i === state.typedIndex) {
        charSpan.className = state.hasError ? 'char-error' : 'char-current';
      } else {
        charSpan.className = 'char-pending';
      }
    }
    scrollToCurrentChar();
  }

  // Keep the current character centred in the visible passage container by
  // translating the inner div left. The container clips with overflow:hidden,
  // so only the window around the cursor is visible at any time.
  function scrollToCurrentChar() {
    var container = document.getElementById('passage-container');
    var currentSpan = passageInner.children[state.typedIndex];
    if (!currentSpan) return;
    var containerWidth = container.offsetWidth;
    var charLeft = currentSpan.offsetLeft;
    var shift = Math.max(0, charLeft - containerWidth / 2);
    passageInner.style.transform = 'translateX(-' + shift + 'px)';
  }

  // Update both progress bar fills and race icon positions.
  // Bar widths use the raw 0–100 values; icon positions are clamped to 1–99%
  // so the emoji never clips outside the visible track area.
  function updateBars() {
    var adIconLeft   = Math.min(ICON_POSITION_MAX, Math.max(ICON_POSITION_MIN, state.videoProgress));
    var skipIconLeft = Math.min(ICON_POSITION_MAX, Math.max(ICON_POSITION_MIN, state.skipProgress));
    adBar.style.width     = state.videoProgress + '%';
    skipBarEl.style.width = state.skipProgress  + '%';
    flagIcon.style.left   = adIconLeft   + '%';
    carIcon.style.left    = skipIconLeft + '%';
  }

  // Check whether the win condition has been met and, if so, report success.
  // Win requires ALL of:
  //   1. Skip bar has overtaken the ad bar
  //   2. Enough of the ad has played (currentTime >= winThreshold), OR cheat mode is active
  //   3. The user has typed at least MIN_SENTENCES_TO_WIN sentences, OR cheat mode is active
  function checkWin() {
    if (state.phase !== 'typing') return;
    var timeOk      = state.cheatMode || state.currentTime >= getWinThreshold();
    var sentencesOk = state.cheatMode || state.sentencesTyped >= MIN_SENTENCES_TO_WIN;
    if (state.skipProgress > state.videoProgress && timeOk && sentencesOk) {
      state.phase = 'done';
      window.top.postMessage({ type: 'success' }, '*');
    }
  }

})(window, document);
  </script>
</body>
</html>
